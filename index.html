<!DOCTYPE html>
<html>
<head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-772TLD9DX3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-772TLD9DX3');
</script>

<meta charset="UTF-8">
<title>米池計算器</title>
    <link rel="stylesheet" href="css/style.css?v=20260202">
    <script src="js/i18n.js?v=20260202"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	<div class="container">
		<div class="header-row">
			<h1 data-i18n="pageTitle">米池計算器</h1>
			<select id="languageSelector">
				<option value="zh-TW">繁體中文</option>
				<option value="en">English</option>
				<option value="ja">日本語</option>
			</select>
		</div>

		<!-- 三池同時顯示（不使用 card） -->
		<div class="section pool-panels">
			<div class="pool-panel" data-pool="yuan">
				<div class="pool-panel-title"><span>原池</span></div>
				<label>目標五星數(角色) <input type="number" id="targetFiveStars_yuan" min="0" value="1"></label>
				<label>目標五星數(武器) <input type="number" id="targetFiveStars_weapon_yuan" min="0" value="1"></label>
				<label>已墊抽數(角色) <input type="number" id="currentPulls_yuan" min="0" value="0"></label>
				<label>已墊抽數(武器) <input type="number" id="currentPulls_weapon_yuan" min="0" value="0"></label>
			</div>

			<div class="pool-panel" data-pool="tie">
				<div class="pool-panel-title"><span>鐵池</span></div>
				<label>目標五星數(角色) <input type="number" id="targetFiveStars_tie" min="0" value="1"></label>
				<label>目標五星數(武器) <input type="number" id="targetFiveStars_weapon_tie" min="0" value="1"></label>
				<label>已墊抽數(角色) <input type="number" id="currentPulls_tie" min="0" value="0"></label>
				<label>已墊抽數(武器) <input type="number" id="currentPulls_weapon_tie" min="0" value="0"></label>
			</div>

			<div class="pool-panel" data-pool="jue">
				<div class="pool-panel-title"><span>絕池</span></div>
				<label>目標五星數(角色) <input type="number" id="targetFiveStars_jue" min="0" value="1"></label>
				<label>目標五星數(武器) <input type="number" id="targetFiveStars_weapon_jue" min="0" value="1"></label>
				<label>已墊抽數(角色) <input type="number" id="currentPulls_jue" min="0" value="0"></label>
				<label>已墊抽數(武器) <input type="number" id="currentPulls_weapon_jue" min="0" value="0"></label>
			</div>
		</div>

		<!-- 傳統單池輸入（隱藏，用於現有 compute 邏輯不變） -->
		<div class="section" id="legacy-standard-inputs" style="display:none;">
			<label data-i18n="targetFiveStars">目標五星數：</label>
			<label for="targetFiveStars" data-i18n="character">角色</label>
			<input type="number" id="targetFiveStars" name="targetFiveStars" min="0" value="1">
			<label for="targetFiveStars_weapon" data-i18n="weapon">武器</label>
			<input type="number" id="targetFiveStars_weapon" name="targetFiveStars_weapon" min="0" value="1">

			<label><span data-i18n="currentPulls">已墊抽數</span><a class="tooltip" target="_blank">? <span class="tooltiptext" data-i18n="tooltipCurrentPulls">距離上一次抽出5星後已經抽了多少抽。</span></a>：</label>
			<label for="currentPulls" data-i18n="character">角色</label>
			<input type="number" id="currentPulls" name="currentPulls" min="0" value="0">
			<label for="currentPulls_weapon" data-i18n="weapon">武器</label>
			<input type="number" id="currentPulls_weapon" name="currentPulls_weapon" min="0" value="0">
		</div>

		<div class="section">
			<label for="simTimes" data-i18n="simTimes">模擬次數:</label>
			<input type="number" id="simTimes" name="simTimes" min="1" max="1000000000" value="1000000">
		</div>


		<div class="section">
			<label><span data-i18n="hardPity">卡池已大保底</span><a class="tooltip" target="_blank">? <span class="tooltiptext" data-i18n="tooltipHardPity">卡池上一次抽出的5星是非UP角色/武器。</span></a>：</label>
			<label class='hardPityLabel' ><input type="checkbox" id="hardPity" name="hardPity" > <span data-i18n="character">角色</span>
			</label>
			<label class='hardPityLabel' ><input type="checkbox" id="hardPity_weapon" name="hardPity_weapon" > <span data-i18n="weapon">武器</span></label>
			<label id="hardCountLabel" for="hardCount">
			<span data-i18n="brightLight">明光計數器</span>
			<a href="https://www.bilibili.com/video/BV13XBiYZErT" class="tooltip"
				target="_blank">? <span class="tooltiptext" data-i18n="tooltipBrightLight">明光機制模型使用B站up"一棵平衡树"的推論計算。有做些微調整使結果更接近大數據。</span>
			</a>
			<input type="number" id="hardCount" name="hardCount" min="0" max="3" value="1" >
			</label>
		</div>
		
		<div style='background-color: rgb(230, 247, 255);'>
		<div class="section">
			<div>
			<label for="draw4Star"><input type="checkbox" id="draw4Star" name="draw4Star" >
			<span data-i18n="draw4Star">墊池抽四星(角色)</span></label>
			<a class="tooltip" target="_blank">? <span class="tooltiptext" data-i18n="tooltipDraw4Star">計算在抽出指定數量的PU五星角色前。抽到指定數量的PU四星角色的成功率。</span></a>
			</div>

		</div>

		<div class='section form4stars'>
			<a style="color: #666; font-size: 0.85rem; font-style: italic;" data-i18n="draw4StarHint">是否墊池沒有絕對對錯，只有能否接受風險。墊池抽四星有歐有非，抽卡前請詳閱公開說明書(並沒有)。</a>
			<br>
			<label for="target4Stars" data-i18n="target4Stars">目標四星數：</label> <input type="number"
				id="target4Stars" name="target4Stars" min="0" value=1>
				<div>
				<label for="current4Pulls" data-i18n="current4Pulls">距離上個四星已抽</label> <input type="number"
				id="current4Pulls" name="current4Pulls" min="0" value=0> <input type="checkbox"
				id="hardPity4" name="hardPity4"><label
				class='hardPity4Label' data-i18n="hardPity4Label">上個四星是PU角色(不論是否是目標角色)</label>
				</div>
		</div>
		</div>



		<!-- 模擬按鈕 -->
        <div class="section">
            <button id="simulateButton" data-i18n="simulate">模擬</button>
        </div>

        <!-- 模擬結果 -->
        <div class="section">
            <label for="result" data-i18n="result">模擬結果:</label>
			<div id='result'></div>
        </div>

		<!-- 圖表 -->
		<div class="section">
			<canvas id="resultChart" width="400" height="200"></canvas>
		</div>
	</div>

	<script src="js/script.js?v=20260202"></script>

	<div id="loadingOverlay" class="overlay" style="display: none;">
		<div class="loading-content">
			<img src="image/gi_load.gif" alt="計算中" style="width: 150px; height: 150px;">
			<p data-i18n="calculating">計算中...</p>
		</div>
	</div>

</body>
<footer style="background-color: #f5f5f5; padding: 20px; text-align: center; font-size: 0.75rem; color: #666;">
  <p data-i18n="footerText">非營利開源專案，如發現BUG或有改進意見，歡迎至巴哈姆特論壇搜尋"米池計算器"向作者回報。</p>
  <p>
    <a href="https://github.com/gino8246/Gacha_Simulator" target="_blank" data-i18n="githubProject">GitHub 專案</a>
  </p>
</footer>
</html>
